<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial‑scale=1.0">
<title>Rutas Lima • Mapa + Ubicación</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif;margin:0;padding:0;}
body{background:#f0f4f8;padding:10px;}
.contenedor{max-width:980px;margin:auto;background:#fff;border-radius:10px;padding:12px;box-shadow:0 3px 10px #0002;}
h2{color:#1a73e8;text-align:center;margin-bottom:12px;font-size:19px;}
.barra{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center;}
input,button{padding:10px;border-radius:7px;border:1px solid #ccc;font-size:15px;flex:1;min-width:190px;}
button{flex:initial;background:#1a73e8;color:#fff;border:none;cursor:pointer;font-weight:500;}
button:hover{background:#0d59c2;}
#mapa{width:100%;height:480px;min-height:320px;border-radius:8px;margin:10px 0;} /* ✅ Altura fija segura */
.info-titulo{font-weight:600;color:#333;margin:8px 0;}
.ruta{background:#f8faff;border-left:4px solid #2e7d32;padding:10px;margin-bottom:8px;border-radius:0 6px 6px 0;}
.datos{font-weight:bold;color:#1b5e20;}
.etq{display:inline-block;font-size:12px;padding:2px 6px;border-radius:4px;color:#fff;margin-right:4px;}
.bus{background:#34a853;} .metro{background:#f9a825;color:#222;} .corredor{background:#ea4335;} .caminar{background:#9aa0a6;}
.pasos{font-size:14px;line-height:1.5;margin-top:4px;color:#333;}
@media (max-width:480px){input,button{font-size:14px;padding:9px;}h2{font-size:17px;}#mapa{height:340px;}}
</style>

<!-- ✅ PON TU CLAVE VÁLIDA AQUÍ -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places&language=es&region=PE"></script>
</head>
<body>
<div class="contenedor">
  <h2>🚌 Rutas • Menos transbordos</h2>
  <div class="barra">
    <button onclick="obtenerUbicacion()">📍 Mi ubicación</button>
    <input id="origen" placeholder="Dirección o punto de inicio">
    <input id="destino" placeholder="Dirección o destino">
    <button onclick="calcularRutas()">🔍 Calcular</button>
  </div>
  <div id="mapa"></div>
  <div class="info-titulo">📋 Ordenadas: <b>menos cambios primero</b></div>
  <div id="lista"></div>
</div>

<script>
let mapa, dirServ, dirVis;

// ✅ Inicio seguro
function iniciarMapa(){
  mapa = new google.maps.Map(document.getElementById("mapa"),{
    center:{lat:-12.0464,lng:-77.0428},zoom:12,fullscreenControl:true,mapTypeControl:true
  });
  dirServ = new google.maps.DirectionsService();
  dirVis = new google.maps.DirectionsRenderer({preserveViewport:false,draggable:false});
  dirVis.setMap(mapa);
}

// ✅ Ubicación con mensajes claros
function obtenerUbicacion(){
  if(!navigator.geolocation){alert("❌ Navegador no admite ubicación");return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const ll={lat:pos.coords.latitude,lng:pos.coords.longitude};
      document.getElementById("origen").value=ll.lat.toFixed(5)+", "+ll.lng.toFixed(5);
      mapa.setCenter(ll);mapa.setZoom(15);
    },
    err=>{
      let m="⚠️ No se pudo ubicar: ";
      if(err.code===1)m+="Permiso denegado — habilítalo en configuración";
      else if(err.code===2)m+="No se pudo determinar posición";
      else m+="Error desconocido";
      alert(m);
    },
    {enableHighAccuracy:true,timeout:8000,maximumAge:0}
  );
}

function calcularRutas(){
  const o=document.getElementById("origen").value.trim(),d=document.getElementById("destino").value.trim(),L=document.getElementById("lista");
  L.innerHTML="<em>Buscando rutas más directas…</em>";
  if(!o||!d){alert("⚠️ Completa origen y destino");return;}

  const req={
    origin:o,destination:d,travelMode:"TRANSIT",provideRouteAlternatives:true,
    transitOptions:{modes:["BUS","RAIL"],routingPreference:"LESS_TRANSFERS"}, // ✅ Prioriza pocos cambios
    unitSystem:"METRIC",language:"es",region:"PE"
  };

  dirServ.route(req,(res,est)=>{
    L.innerHTML="";
    if(est!=="OK"){L.innerHTML="<span style='color:red'>❌ Sin rutas: "+est+"</span>";return;}
    dirVis.setDirections(res);
    // ✅ Ordena: menos transbordos primero
    const ord=res.routes.slice().sort((a,b)=>{
      const ta=a.legs[0].steps.filter(s=>s.travelMode==="TRANSIT").length;
      const tb=b.legs[0].steps.filter(s=>s.travelMode==="TRANSIT").length;
      return ta‑tb;
    });
    ord.forEach((r,i)=>{
      const tr=r.legs[0],div=document.createElement("div");
      div.className="ruta";let txt="";
      tr.steps.forEach(p=>{
        let et="";
        if(p.travelMode==="WALKING")et='<span class="etq caminar">Caminar</span>';
        else if(p.travelMode==="TRANSIT"){
          const t=p.transit.line.vehicle.type;
          if(t==="BUS")et='<span class="etq bus">Bus</span>';
          else if(/RAIL|SUBWAY/.test(t))et='<span class="etq metro">Metro/Metropolitano</span>';
          else et='<span class="etq corredor">Corredor</span>';
        }
        txt+=et+p.instructions.replace(/<[^>]+>/g,"")+" ("+p.distance.text+")<br>";
      });
      div.innerHTML=`<div class="datos">Ruta ${i+1} • ⏱️ ${tr.duration.text} • 📏 ${tr.distance.text}</div><div class="pasos">${txt}</div>`;
      L.appendChild(div);
    });
  });
}

// ✅ Carga segura
window.addEventListener("load",iniciarMapa);
</script>
</body>
</html>
