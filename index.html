<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Transporte Público | Google Maps</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            height: 100vh;
        }
        .panel {
            width: 400px;
            padding: 15px;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }
        .map-container {
            flex: 1;
        }
        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #202124;
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: #5f6368;
        }
        input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        button:hover {
            background: #1557b0;
        }
        #btnUbicacion {
            background: #34a853;
        }
        #btnUbicacion:hover {
            background: #2e8b47;
        }
        #resultados {
            margin-top: 15px;
            font-size: 14px;
        }
        .ruta-item {
            padding: 10px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .ruta-titulo {
            font-weight: bold;
            margin-bottom: 4px;
            color: #202124;
        }
        .ruta-detalle {
            color: #5f6368;
            line-height: 1.4;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h2>🚌🚇 Planifica tu viaje</h2>

        <div class="input-group">
            <label>Punto de partida</label>
            <input id="origen" placeholder="Dirección o ubicación actual">
            <button id="btnUbicacion">Usar mi ubicación actual</button>
        </div>

        <div class="input-group">
            <label>Destino (dirección a llegar)</label>
            <input id="destino" placeholder="Ej: Av. Javier Prado 123, Lima">
        </div>

        <button id="btnCalcular">Ver rutas y líneas</button>

        <div id="resultados"></div>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <script>
        let map;
        let directionsService;
        let directionsRenderer;
        let autocompleteOrigen, autocompleteDestino;

        // Inicializar mapa y servicios
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: -12.0464, lng: -77.0428 }, // Lima, Perú
                zoom: 12
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false
            });

            // Autocompletar direcciones
            autocompleteOrigen = new google.maps.places.Autocomplete(document.getElementById('origen'));
            autocompleteDestino = new google.maps.places.Autocomplete(document.getElementById('destino'));

            // Botón: usar ubicación actual
            document.getElementById('btnUbicacion').addEventListener('click', () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (posicion) => {
                            const lat = posicion.coords.latitude;
                            const lng = posicion.coords.longitude;
                            const ubicacion = new google.maps.LatLng(lat, lng);
                            // Convertir coordenadas a dirección legible
                            new google.maps.Geocoder().geocode({ location: ubicacion }, (resultados, estado) => {
                                if (estado === "OK" && resultados[0]) {
                                    document.getElementById('origen').value = resultados[0].formatted_address;
                                } else {
                                    document.getElementById('origen').value = `${lat}, ${lng}`;
                                }
                            });
                        },
                        (error) => {
                            alert("No se pudo obtener tu ubicación. Verifica permisos.");
                        }
                    );
                } else {
                    alert("Tu navegador no admite geolocalización.");
                }
            });

            // Botón: calcular rutas
            document.getElementById('btnCalcular').addEventListener('click', calcularRuta);
        }

        function calcularRuta() {
            const origen = document.getElementById('origen').value.trim();
            const destino = document.getElementById('destino').value.trim();

            if (!origen || !destino) {
                alert("Escribe origen y destino");
                return;
            }

            const solicitud = {
                origin: origen,
                destination: destino,
                travelMode: google.maps.TravelMode.TRANSIT, // ⚠️ MODO TRANSPORTE PÚBLICO
                transitOptions: {
                    modes: ["BUS", "RAIL", "SUBWAY", "TRAIN"], // Incluye: buses, corredores, Metropolitano, tren, metro
                    routingPreference: google.maps.TransitRoutePreference.FEWER_TRANSFERS
                },
                provideRouteAlternatives: true // Mostrar TODAS las opciones
            };

            directionsService.route(solicitud, (respuesta, estado) => {
                if (estado === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(respuesta);
                    mostrarResultados(respuesta);
                } else {
                    document.getElementById('resultados').innerHTML = "<p>No se encontraron rutas disponibles.</p>";
                }
            });
        }

        function mostrarResultados(respuesta) {
            const rutas = respuesta.routes;
            let html = "";

            rutas.forEach((ruta, indice) => {
                const tramo = ruta.legs[0];
                let detalles = "";

                tramo.steps.forEach(paso => {
                    if (paso.travel_mode === "TRANSIT") {
                        const transito = paso.transit;
                        const linea = transito.line;
                        detalles += `
                            <div>
                                <strong>${linea.vehicle.name}:</strong> ${linea.short_name || linea.name}
                                <br>🔹 De: ${transito.departure_stop.name}
                                <br>🔹 A: ${transito.arrival_stop.name}
                                <br>⏱️ Salida: ${transito.departure_time?.text || 'No disponible'}
                            </div>
                        `;
                    } else if (paso.travel_mode === "WALKING") {
                        detalles += `<div>🚶 Caminar: ${paso.distance.text} (${paso.duration.text})</div>`;
                    }
                });

                html += `
                    <div class="ruta-item">
                        <div class="ruta-titulo">Opción ${indice+1} — Tiempo total: ${tramo.duration.text}</div>
                        <div class="ruta-detalle">
                            📏 Distancia: ${tramo.distance.text}<br>
                            ${detalles}
                        </div>
                    </div>
                `;
            });

            document.getElementById('resultados').innerHTML = html;
        }

        window.initMap = initMap;
    </script>
</body>
</html>
