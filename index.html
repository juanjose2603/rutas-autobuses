<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Transporte + Seguimiento</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; }
        .panel { padding: 12px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .campo { margin: 8px 0; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
        button { padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 6px 6px 6px 0; font-size: 14px; }
        select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; background: white; }
        .btn-azul { background: #1a73e8; color: white; }
        .btn-verde { background: #34a853; color: white; }
        .btn-rojo { background: #ea4335; color: white; }
        .btn-gris { background: #70757a; color: white; }
        button:hover { opacity: 0.9; }
        #map { flex: 1; width: 100%; }
        #info-ruta { margin-top: 12px; padding: 10px; background: white; border-radius: 4px; border: 1px solid #eee; font-size: 14px; max-height: 260px; overflow-y: auto; }
        #compartir-info { margin-top: 10px; padding: 8px; background: #e8f0fe; border-radius: 4px; display: none; font-size: 13px; }
        .linea { margin: 8px 0 8px 12px; }
        .ruta1 { color: #1a73e8; font-weight: bold; }
        .ruta2 { color: #34a853; font-weight: bold; }
        .ruta3 { color: #fbbc05; font-weight: bold; }
        .ruta4 { color: #ea4335; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel">
        <input type="text" id="origen" class="campo" placeholder="Origen — se detecta automáticamente">
        <input type="text" id="destino" class="campo" placeholder="Dirección de llegada">

        <button class="btn-azul" onclick="usarMiUbicacion()">📍 Mi ubicación</button>
        <button class="btn-azul" onclick="calcularRuta()">🚌 Buscar rutas</button>
        <button class="btn-verde" onclick="iniciarSeguimiento()">🔁 Seguimiento recorrido</button>
        <button class="btn-gris" onclick="limpiarRecorrido()">🧹 Limpiar recorrido</button>
        <button class="btn-rojo" onclick="detenerSeguimiento()" id="btnDetener" style="display:none;">⏹️ Detener seguimiento</button>

        <!-- Menú desplegable -->
        <select id="selectorRutas" style="display: none;" onchange="mostrarRutaSeleccionada()">
            <option value="">Selecciona una ruta</option>
        </select>

        <div id="compartir-info">
            <p>✅ Seguimiento activo. Actualización cada 3 segundos.</p>
            <p>Enlace: <a id="enlaceUbicacion" href="#" target="_blank">Cargando...</a></p>
            <button onclick="copiarEnlace()">📋 Copiar enlace</button>
        </div>

        <div id="info-ruta"></div>
    </div>

    <div id="map"></div>

    <script>
        let mapa, servicioDirecciones, marcadorUbicacion, watchId = null;
        let lineaRecorrido = null, puntosRecorrido = [];
        let respuestaCompleta = null; // Guardamos toda la respuesta correctamente
        let renderizadorActivo = null;
        const COLORES = ["#1a73e8", "#34a853", "#fbbc05", "#ea4335"];

        function iniciarMapa() {
            mapa = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 19.4326, lng: -99.1332 },
                zoom: 12
            });
            servicioDirecciones = new google.maps.DirectionsService();
            new google.maps.places.Autocomplete(document.getElementById("origen"));
            new google.maps.places.Autocomplete(document.getElementById("destino"));
            usarMiUbicacion();
        }

        function usarMiUbicacion() {
            if (!navigator.geolocation) return alert("Geolocalización no soportada en tu navegador");
            navigator.geolocation.getCurrentPosition(pos => {
                const ubicacion = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                mapa.setCenter(ubicacion);
                if (!marcadorUbicacion) {
                    marcadorUbicacion = new google.maps.Marker({
                        position: ubicacion,
                        map: mapa,
                        title: "Mi ubicación actual",
                        icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
                    });
                } else {
                    marcadorUbicacion.setPosition(ubicacion);
                }
                new google.maps.Geocoder().geocode({ location: ubicacion }, res => {
                    if (res[0]) document.getElementById("origen").value = res[0].formatted_address;
                });
            }, () => alert("No se pudo obtener la ubicación. Revisa los permisos."));
        }

        // Calcular rutas y llenar el menú
        function calcularRuta() {
            const origen = document.getElementById("origen").value.trim();
            const destino = document.getElementById("destino").value.trim();
            if (!origen || !destino) return alert("Completa ambos campos: origen y destino");

            // Limpiar datos anteriores
            respuestaCompleta = null;
            if (renderizadorActivo) renderizadorActivo.setMap(null);
            document.getElementById("info-ruta").innerHTML = "";
            const selector = document.getElementById("selectorRutas");
            selector.innerHTML = '<option value="">Cargando rutas...</option>';
            selector.style.display = "block";

            const solicitud = {
                origin: origen,
                destination: destino,
                travelMode: "TRANSIT",
                transitOptions: { modes: ["BUS", "SUBWAY", "TRAIN"], routingPreference: "FEWER_TRANSFERS" },
                provideRouteAlternatives: true
            };

            servicioDirecciones.route(solicitud, (respuesta, estado) => {
                if (estado !== "OK") {
                    selector.innerHTML = '<option value="">No se encontraron rutas</option>';
                    document.getElementById("info-ruta").innerHTML = "❌ No hay rutas disponibles para este trayecto.";
                    return;
                }

                // Guardamos la respuesta completa para usarla después
                respuestaCompleta = respuesta;

                // Llenar menú desplegable
                selector.innerHTML = '<option value="">Elige una ruta</option>';
                respuestaCompleta.routes.forEach((ruta, indice) => {
                    const duracion = ruta.legs[0].duration.text;
                    const distancia = ruta.legs[0].distance.text;
                    const opcion = document.createElement("option");
                    opcion.value = indice;
                    opcion.textContent = `Ruta ${indice + 1} — ${duracion} | ${distancia}`;
                    selector.appendChild(opcion);
                });
            });
        }

        // Mostrar ruta seleccionada en el mapa y detalles
        function mostrarRutaSeleccionada() {
            const indice = parseInt(document.getElementById("selectorRutas").value);
            if (isNaN(indice) || !respuestaCompleta || !respuestaCompleta.routes[indice]) return;

            // Borrar ruta anterior
            if (renderizadorActivo) renderizadorActivo.setMap(null);

            // Crear nuevo renderizador con la ruta correcta
            renderizadorActivo = new google.maps.DirectionsRenderer({
                map: mapa,
                directions: respuestaCompleta, // Usamos la respuesta completa guardada
                routeIndex: indice,
                suppressMarkers: false,
                polylineOptions: {
                    strokeColor: COLORES[indice] || "#666666",
                    strokeWeight: 6,
                    strokeOpacity: 0.9
                }
            });

            // Mostrar detalles completos con número de línea
            mostrarDetallesRuta(indice);
        }

        // Mostrar información detallada con número de ruta
        function mostrarDetallesRuta(indice) {
            const ruta = respuestaCompleta.routes[indice];
            const tramo = ruta.legs[0];
            const contenedor = document.getElementById("info-ruta");
            const claseColor = `ruta${indice + 1}`;

            let html = `<p class="${claseColor}">🚏 Ruta ${indice + 1} | Duración: ${tramo.duration.text} | Distancia: ${tramo.distance.text}</p><hr>`;

            tramo.steps.forEach(paso => {
                if (paso.travel_mode === "TRANSIT") {
                    const linea = paso.transit.line;
                    const tipo = linea.vehicle.type;
                    let nombreTipo = "";
                    let numeroRuta = linea.short_name || linea.name || "Sin número";

                    if (tipo === "BUS") {
                        nombreTipo = linea.short_name?.startsWith("R") ? "Corredor" :
                                     linea.short_name?.startsWith("A") ? "Alimentador" : "Autobús";
                    } else if (tipo === "SUBWAY") {
                        nombreTipo = "Metro";
                    } else if (tipo === "TRAIN" || tipo === "RAIL") {
                        nombreTipo = "Metropolitano / Tren";
                    }

                    html += `<p class="linea ${claseColor}">✅ ${nombreTipo}: <strong>${numeroRuta}</strong></p>
                             <p class="linea">De: ${paso.transit.departure_stop.name} → Hasta: ${paso.transit.arrival_stop.name}</p>`;
                } else {
                    html += `<p class="linea">🚶 A pie: ${paso.distance.text}</p>`;
                }
            });

            contenedor.innerHTML = html;
        }

        // Funciones de seguimiento de recorrido
        function iniciarSeguimiento() {
            if (!navigator.geolocation) return alert("Tu navegador no admite geolocalización");
            if (watchId) detenerSeguimiento();

            document.getElementById("compartir-info").style.display = "block";
            document.getElementById("btnDetener").style.display = "inline-block";
            limpiarRecorrido();

            lineaRecorrido = new google.maps.Polyline({
                path: puntosRecorrido,
                strokeColor: "#2196F3",
                strokeOpacity: 0.9,
                strokeWeight: 5
            });
            lineaRecorrido.setMap(mapa);

            watchId = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6);
                const lng = pos.coords.longitude.toFixed(6);
                const ubicacion = { lat: parseFloat(lat), lng: parseFloat(lng) };

                puntosRecorrido.push(ubicacion);
                lineaRecorrido.setPath(puntosRecorrido);
                if (marcadorUbicacion) marcadorUbicacion.setPosition(ubicacion);
                mapa.setCenter(ubicacion);

                document.getElementById("enlaceUbicacion").href = `https://www.google.com/maps?q=${lat},${lng}`;
                document.getElementById("enlaceUbicacion").textContent = `${lat}, ${lng}`;
            }, err => alert("Error al obtener ubicación: " + err.message), {
                enableHighAccuracy: true,
                maximumAge: 2000,
                timeout: 5000
            });
        }

        function detenerSeguimiento() {
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            document.getElementById("compartir-info").style.display = "none";
            document.getElementById("btnDetener").style.display = "none";
        }

        function limpiarRecorrido() {
            puntosRecorrido = [];
            if (lineaRecorrido) lineaRecorrido.setPath([]);
        }

        function copiarEnlace() {
            const enlace = document.getElementById("enlaceUbicacion").href;
            navigator.clipboard.writeText(enlace)
                .then(() => alert("Enlace copiado ✅"))
                .catch(() => alert("No se pudo copiar el enlace"));
        }

        window.onload = iniciarMapa;
    </script>
</body>
</html>
