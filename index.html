<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Transporte Lima</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { display:flex; flex-direction:column; height:100vh; }
        .panel { padding:12px; background:#f8f9fa; border-bottom:1px solid #ddd; }
        .campo { margin:8px 0; display:flex; gap:8px; flex-wrap:wrap; }
        input { flex:1; min-width:220px; padding:10px; border:1px solid #ccc; border-radius:4px; font-size:15px; }
        button { padding:10px 16px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
        .btn-ubicacion { background:#2196F3; color:white; }
        .btn-buscar { background:#009E5F; color:white; }
        #map { flex:1; width:100%; }
        #resultados { max-height:220px; overflow-y:auto; padding:10px; background:#fff; border-top:1px solid #ddd; font-size:14px; }
        .ruta { margin:8px 0; padding:8px; border-left:3px solid #009E5F; background:#f7fdf9; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="campo">
            <input type="text" id="origen" placeholder="Dirección de partida">
            <button class="btn-ubicacion" onclick="usarUbicacionActual()">📍 Usar mi ubicación</button>
        </div>
        <div class="campo">
            <input type="text" id="destino" placeholder="Dirección de destino">
            <button class="btn-buscar" onclick="calcularRuta()">🔍 Ver rutas</button>
        </div>
    </div>
    <div id="map"></div>
    <div id="resultados"></div>

    <script>
        let mapa, direccionesServicio, renderizadorRuta, autocompletarOrigen, autocompletarDestino;

        function iniciarMapa() {
            // Centro en Lima
            const lima = { lat: -12.0464, lng: -77.0428 };
            mapa = new google.maps.Map(document.getElementById("map"), {
                center: lima,
                zoom: 13,
                mapTypeControl: false
            });

            direccionesServicio = new google.maps.DirectionsService();
            renderizadorRuta = new google.maps.DirectionsRenderer({ map: mapa, suppressMarkers: false });

            // Autocompletar direcciones
            autocompletarOrigen = new google.maps.places.Autocomplete(document.getElementById("origen"));
            autocompletarDestino = new google.maps.places.Autocomplete(document.getElementById("destino"));
        }

        // Usar ubicación actual
        function usarUbicacionActual() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        new google.maps.Geocoder().geocode({ location: coords }, (res) => {
                            if (res[0]) document.getElementById("origen").value = res[0].formatted_address;
                        });
                    },
                    () => alert("No se pudo obtener tu ubicación")
                );
            } else alert("Tu navegador no soporta geolocalización");
        }

        // Calcular ruta con transporte público
        function calcularRuta() {
            const origen = document.getElementById("origen").value;
            const destino = document.getElementById("destino").value;
            if (!origen || !destino) return alert("Completa ambos campos");

            direccionesServicio.route({
                origin: origen,
                destination: destino,
                travelMode: google.maps.TravelMode.TRANSIT,
                transitOptions: { modes: ["BUS", "RAIL"], routingPreference: "FEWER_TRANSFERS" }
            }, (respuesta, estado) => {
                if (estado === "OK") {
                    renderizadorRuta.setDirections(respuesta);
                    mostrarDetallesRuta(respuesta);
                } else {
                    document.getElementById("resultados").innerHTML = "❌ No se encontraron rutas";
                }
            });
        }

        // Mostrar detalles: líneas, tiempos, transbordos
        function mostrarDetallesRuta(datos) {
            const rutas = datos.routes[0].legs[0];
            let html = `<h4>🕒 Duración total: ${rutas.duration.text} | 📏 Distancia: ${rutas.distance.text}</h4>`;
            html += "<br><strong>🚌 Medios de transporte:</strong><br>";

            rutas.steps.forEach(paso => {
                if (paso.travel_mode === "TRANSIT") {
                    const tr = paso.transit;
                    html += `<div class="ruta">
                        <strong>${tr.line.vehicle.name}:</strong> ${tr.line.name || tr.line.short_name}<br>
                        Parada: ${tr.departure_stop.name} → ${tr.arrival_stop.name}<br>
                        Salida: ${tr.departure_time.text} | Llegada: ${tr.arrival_time.text}
                    </div>`;
                } else if (paso.travel_mode === "WALKING") {
                    html += `<div>🚶 Caminar: ${paso.duration.text} hasta la parada</div>`;
                }
            });

            document.getElementById("resultados").innerHTML = html;
        }
    </script>

    <!-- Reemplaza TU_CLAVE_AQUI por tu clave real -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places&callback=iniciarMapa&language=es&region=PE"></script>
</body>
</html>
