<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Actualizadas: Buses, Corredores y Metropolitano</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        .container { max-width:900px; margin:15px auto; padding:0 15px; }
        #origen, #destino { width:100%; padding:12px; font-size:16px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; }
        #btnUbicacion { background:#1a73e8; color:white; border:none; padding:10px 15px; border-radius:4px; cursor:pointer; margin-bottom:15px; }
        #btnUbicacion:hover { background:#1557b0; }
        #map { height:450px; width:100%; margin-bottom:15px; border-radius:6px; }
        #resultado { padding:15px; background:#f8f9fa; border-radius:6px; min-height:80px; }
        h2 { margin:15px 0; color:#202124; }
        #estado { color:#1a73e8; margin-bottom:10px; font-size:14px; }
        
        /* Estilos para diferenciar tipos de transporte */
        .ruta-item { padding:12px; margin:8px 0; background:white; border-left:4px solid; border-radius:4px; }
        .tipo-bus { border-color:#28a745; }
        .tipo-corredor { border-color:#ffc107; }
        .tipo-metropolitano { border-color:#dc3545; }
        .tiempo { font-weight:bold; color:#28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h2>¿Qué transporte me lleva? (Actualizado 2026)</h2>
        <div id="estado">🔄 Obteniendo tu ubicación...</div>

        <!-- 📍 NUEVO: Campo para elegir origen + botón ubicación actual -->
        <label>📍 Punto de inicio:</label>
        <input id="origen" placeholder="Tu ubicación o escribe otra dirección..." />
        <button id="btnUbicacion" onclick="usarUbicacionActual()">Usar mi ubicación actual</button>

        <label>🎯 Destino:</label>
        <input id="destino" placeholder="Escribe dirección o lugar de destino en Lima..." />

        <div id="map"></div>
        <div id="resultado">Las rutas, tiempos y tipos de transporte aparecerán aquí.</div>
    </div>

    <script>
        let map, directionsService, directionsRenderer, autocompleteOrigen, autocompleteDestino;
        let ubicacionActual = null;

        function initMap() {
            // Mapa centrado en Lima
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -12.0464, lng: -77.0428 },
                zoom: 12
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: false });
            new google.maps.TransitLayer().setMap(map);

            // Autocompletar para ORIGEN y DESTINO
            autocompleteOrigen = new google.maps.places.Autocomplete(document.getElementById("origen"), {
                componentRestrictions: { country: "pe" },
                fields: ["formatted_address", "geometry"]
            });
            autocompleteDestino = new google.maps.places.Autocomplete(document.getElementById("destino"), {
                componentRestrictions: { country: "pe" },
                fields: ["formatted_address", "geometry"]
            });

            // Calcular ruta al cambiar origen o destino
            autocompleteOrigen.addListener("place_changed", calcularRuta);
            autocompleteDestino.addListener("place_changed", calcularRuta);

            // Obtener ubicación al inicio
            obtenerUbicacionActual();
        }

        // 📍 FUNCIÓN: Usar ubicación GPS como origen
        function usarUbicacionActual() {
            if (navigator.geolocation) {
                document.getElementById("estado").textContent = "🔄 Buscando tu ubicación...";
                navigator.geolocation.getCurrentPosition(
                    (posicion) => {
                        ubicacionActual = {
                            lat: posicion.coords.latitude,
                            lng: posicion.coords.longitude
                        };
                        // Convertir coordenadas a dirección legible
                        new google.maps.Geocoder().geocode({ location: ubicacionActual }, (resultados, estado) => {
                            if (estado === "OK" && resultados[0]) {
                                document.getElementById("origen").value = resultados[0].formatted_address;
                                map.setCenter(ubicacionActual);
                                map.setZoom(14);
                                document.getElementById("estado").textContent = "✅ Ubicación cargada correctamente";
                                calcularRuta(); // Recalcular ruta automáticamente
                            }
                        });
                    },
                    (error) => {
                        document.getElementById("estado").textContent = "❌ No se pudo acceder a tu ubicación";
                        ubicacionActual = "Lima, Perú";
                    }
                );
            } else {
                document.getElementById("estado").textContent = "❌ Navegador no compatible";
            }
        }

        // 📍 DETECTAR UBICACIÓN AL INICIAR
        function obtenerUbicacionActual() {
            usarUbicacionActual();
        }

        // 🚀 CALCULAR RUTA CON TODOS LOS TRANSPORTES
        function calcularRuta() {
            const origen = autocompleteOrigen.getPlace()?.formatted_address || ubicacionActual;
            const destino = autocompleteDestino.getPlace();

            if (!destino?.geometry || !origen) {
                document.getElementById("resultado").innerHTML = "ℹ️ Completa ambos campos para ver rutas.";
                return;
            }

            // ✅ INCLUYE: Buses, Corredores, Metropolitano
            const solicitud = {
                origin: origen,
                destination: destino.formatted_address,
                travelMode: google.maps.TravelMode.TRANSIT,
                provideRouteAlternatives: true,
                transitOptions: {
                    modes: [
                        google.maps.TransitMode.BUS,   // Buses convencionales
                        google.maps.TransitMode.RAIL,  // Corredores y Metropolitano
                        google.maps.TransitMode.SUBWAY // Metropolitano como sistema rápido
                    ],
                    routingPreference: google.maps.TransitRoutingPreference.FEWER_TRANSFERS
                },
                unitSystem: google.maps.UnitSystem.METRIC
            };

            directionsService.route(solicitud, (respuesta, estado) => {
                if (estado === "OK") {
                    directionsRenderer.setDirections(respuesta);
                    mostrarResultados(respuesta);
                } else {
                    document.getElementById("resultado").innerHTML = "❌ No se encontraron rutas disponibles.";
                }
            });
        }

        // 📋 MOSTRAR RESULTADOS CLASIFICADOS + TIEMPOS
        function mostrarResultados(respuesta) {
            let html = "<h3>📋 Opciones de ruta (datos ATU 2026):</h3>";

            respuesta.routes.forEach((ruta, indice) => {
                const tiempoTotal = ruta.legs[0].duration.text;
                const distancia = ruta.legs[0].distance.text;

                html += `
                    <div class="ruta-item">
                        <h4>Opción ${indice+1} ⏱️ <span class="tiempo">${tiempoTotal}</span> | 📏 ${distancia}</h4>
                `;

                // Recorrer cada tramo del viaje
                ruta.legs[0].steps.forEach(paso => {
                    if (paso.travel_mode === "TRANSIT") {
                        const linea = paso.transit.line;
                        const nombreLinea = linea.short_name || linea.name;
                        const tipoVehiculo = linea.vehicle.name;
                        let claseCSS = "";
                        let etiqueta = "";

                        // 🔍 CLASIFICAR TIPO DE TRANSPORTE
                        if (tipoVehiculo.includes("Bus") || nombreLinea.match(/^CR/)) {
                            etiqueta = "🚌 Corredor / Bus: ";
                            claseCSS = "tipo-corredor";
                        } else if (nombreLinea.match(/^[A-D]/) || tipoVehiculo.includes("Metropolitano")) {
                            etiqueta = "🚇 Metropolitano: ";
                            claseCSS = "tipo-metropolitano";
                        } else {
                            etiqueta = "🚌 Bus convencional: ";
                            claseCSS = "tipo-bus";
                        }

                        html += `
                            <p class="${claseCSS}">
                                ${etiqueta}<strong>${nombreLinea}</strong><br>
                                <small>📍 De: ${paso.transit.departure_stop.name}</small><br>
                                <small>🎯 Hasta: ${paso.transit.arrival_stop.name}</small><br>
                                <small>⏱️ Tiempo estimado: ${paso.duration.text}</small>
                            </p>
                        `;
                    } else if (paso.travel_mode === "WALKING") {
                        html += `<p>🚶 Caminar: ${paso.duration.text} (${paso.distance.text})</p>`;
                    }
                });

                html += `</div>`;
            });

            html += `<p style="margin-top:10px; font-size:12px; color:#666;">ℹ️ Información actualizada según red oficial de transporte de Lima (ATU)</p>`;
            document.getElementById("resultado").innerHTML = html;
        }
    </script>

    <!-- 🚨 RECUERDA PONER TU CLAVE API AQUÍ -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places&callback=initMap" async></script>
</body>
</html>
