<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Transporte Lima</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body {display:flex; flex-direction:column; height:100vh;}
        .panel {padding:15px; background:#f8f9fa; border-bottom:1px solid #ddd;}
        input {width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:4px;}
        button {width:100%; padding:10px; margin:5px 0; background:#1a73e8; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:15px;}
        .btn-verde {background:#34a853; margin-bottom:10px;}
        #map {flex:1; min-height:400px;}
        #resultados {margin-top:10px; max-height:220px; overflow-y:auto; font-size:14px;}
        .ruta {padding:8px; margin:5px 0; background:#fff; border-radius:4px; border-left:4px solid #1a73e8;}
        .error {color:#d93025; padding:8px; background:#fce8e6; border-radius:4px; margin:5px 0;}
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-verde" onclick="usarUbicacionActual()">📍 Usar mi ubicación actual</button>
        <input id="origen" placeholder="Dirección de partida" value="Lima, Perú">
        <input id="destino" placeholder="Ej: Av. Javier Prado 123, Lima, Perú">
        <button onclick="calcularRuta()">🔍 Buscar rutas</button>
        <div id="resultados"></div>
    </div>
    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer;
        const LIMA = {lat: -12.0464, lng: -77.0428};

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: LIMA,
                zoom: 12,
                language: "es",
                region: "PE"
            });
            new google.maps.TransitLayer().setMap(map);
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                panel: document.getElementById("resultados"),
                suppressMarkers: false
            });

            new google.maps.places.Autocomplete(document.getElementById("origen"), {componentRestrictions: {country: "PE"}});
            new google.maps.places.Autocomplete(document.getElementById("destino"), {componentRestrictions: {country: "PE"}});
        }

        function usarUbicacionActual() {
            if (!navigator.geolocation) return alert("No admite ubicación");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const ubi = {lat: pos.coords.latitude, lng: pos.coords.longitude};
                    new google.maps.Geocoder().geocode({location: ubi, region:"PE"}, (res, ok) => {
                        if (ok === "OK" && res[0]) document.getElementById("origen").value = res[0].formatted_address;
                        else document.getElementById("origen").value = `${ubi.lat}, ${ubi.lng}`;
                        map.setCenter(ubi);
                    });
                },
                () => alert("Permiso denegado o error"),
                {enableHighAccuracy: true, timeout: 8000}
            );
        }

        function calcularRuta() {
            const origen = document.getElementById("origen").value.trim();
            const destino = document.getElementById("destino").value.trim();
            if (!origen || !destino) return mostrarError("Completa ambas direcciones");

            const origenFinal = origen.includes("Perú") ? origen : origen + ", Lima, Perú";
            const destinoFinal = destino.includes("Perú") ? destino : destino + ", Lima, Perú";

            directionsService.route({
                origin: origenFinal,
                destination: destinoFinal,
                travelMode: google.maps.TravelMode.TRANSIT,
                // ✅ CORREGIDO: sin arrivalTime, modos correctos
                transitOptions: {
                    modes: ["BUS", "SUBWAY"],
                    routingPreference: "FEWER_TRANSFERS"
                },
                provideRouteAlternatives: true,
                unitSystem: google.maps.UnitSystem.METRIC,
                region: "PE",
                language: "es"
            }, (res, estado) => {
                if (estado === "OK") {
                    directionsRenderer.setDirections(res);
                } else {
                    let msg;
                    switch(estado) {
                        case "UNKNOWN_ERROR": msg = "❌ ERROR: Falta activar FACTURACIÓN en Google Cloud (es gratis) o clave mal configurada"; break;
                        case "REQUEST_DENIED": msg = "❌ Clave API inválida o APIs no activadas"; break;
                        case "NOT_FOUND": msg = "❌ No se reconoció la dirección → agrega: , Lima, Perú"; break;
                        case "ZERO_RESULTS": msg = "ℹ️ No hay transporte público directo"; break;
                        default: msg = "Error: " + estado;
                    }
                    mostrarError(msg);
                }
            });
        }

        function mostrarError(texto) {
            document.getElementById("resultados").innerHTML = `<div class="error">${texto}</div>`;
        }
    </script>

    <!-- ✅ APIs completas -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places,geocoding,directions&callback=initMap&language=es&region=PE">
    </script>
</body>
</html>
