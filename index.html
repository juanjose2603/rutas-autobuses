<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Transporte Lima</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body {display:flex; flex-direction:column; height:100vh;}
        .panel {padding:15px; background:#f8f9fa; border-bottom:1px solid #ddd;}
        input {width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:4px;}
        button {width:100%; padding:10px; margin:5px 0; background:#1a73e8; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:15px;}
        .btn-verde {background:#34a853; margin-bottom:10px;}
        #map {flex:1;}
        #resultados {margin-top:10px; max-height:220px; overflow-y:auto; font-size:14px;}
        .ruta {padding:8px; margin:5px 0; background:#fff; border-radius:4px; border-left:4px solid #1a73e8;}
        .error {color:#d93025; padding:8px; background:#fce8e6; border-radius:4px; margin:5px 0;}
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-verde" onclick="usarUbicacionActual()">📍 Usar mi ubicación actual</button>
        <input id="origen" placeholder="Dirección de partida" value="Lima, Perú">
        <input id="destino" placeholder="Ej: Av. Javier Prado 123, Lima, Perú">
        <button onclick="calcularRuta()">🔍 Buscar rutas</button>
        <div id="resultados"></div>
    </div>
    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer;
        const LIMA = {lat: -12.0464, lng: -77.0428};

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: LIMA,
                zoom: 12,
                language: "es",
                region: "PE"
            });
            new google.maps.TransitLayer().setMap(map);
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                panel: document.getElementById("resultados"),
                suppressMarkers: false
            });

            // Autocompletar SOLO Perú
            new google.maps.places.Autocomplete(document.getElementById("origen"), {
                componentRestrictions: {country: "PE"}
            });
            new google.maps.places.Autocomplete(document.getElementById("destino"), {
                componentRestrictions: {country: "PE"}
            });
        }

        // 📍 Ubicación actual
        function usarUbicacionActual() {
            if (!navigator.geolocation) {
                alert("Tu navegador no admite ubicación");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (posicion) => {
                    const lat = posicion.coords.latitude;
                    const lng = posicion.coords.longitude;
                    const ubicacion = {lat, lng};
                    new google.maps.Geocoder().geocode({location: ubicacion, region: "PE"}, (res, estado) => {
                        if (estado === "OK" && res[0]) {
                            document.getElementById("origen").value = res[0].formatted_address;
                            map.setCenter(ubicacion);
                        } else {
                            document.getElementById("origen").value = `${lat}, ${lng}`;
                        }
                    });
                },
                (error) => alert(error.code===1?"Permiso denegado":"No se pudo obtener ubicación"),
                {enableHighAccuracy: true, timeout: 8000}
            );
        }

        // 🚌 CALCULAR RUTA - CORREGIDO PARA LIMA
        function calcularRuta() {
            const origen = document.getElementById("origen").value.trim();
            const destino = document.getElementById("destino").value.trim();

            if (!origen || !destino) {
                mostrarError("Completa ambas direcciones");
                return;
            }

            // ✅ OBLIGATORIO: aseguramos que sea en Perú
            const origenFinal = origen.includes("Perú") ? origen : origen + ", Lima, Perú";
            const destinoFinal = destino.includes("Perú") ? destino : destino + ", Lima, Perú";

            directionsService.route({
                origin: origenFinal,
                destination: destinoFinal,
                travelMode: google.maps.TravelMode.TRANSIT,
                // ✅ INCLUIMOS METROPOLITANO, ALIMENTADORES, CORREDORES, BUSES
                transitOptions: {
                    modes: ["BUS", "RAIL"],
                    routingPreference: "FEWER_TRANSFERS",
                    arrivalTime: new Date(Date.now() + 3600000) // 1 hora desde ahora
                },
                provideRouteAlternatives: true,
                unitSystem: google.maps.UnitSystem.METRIC,
                region: "PE",
                language: "es"
            }, (respuesta, estado) => {
                if (estado === "OK") {
                    directionsRenderer.setDirections(respuesta);
                } else {
                    let mensaje = "No se encontró ruta";
                    if (estado === "NOT_FOUND") mensaje = "No se reconoció una de las direcciones → agrega: , Lima, Perú";
                    if (estado === "REQUEST_DENIED") mensaje = "❌ ERROR: Clave API inválida o falta facturación en Google Cloud";
                    if (estado === "ZERO_RESULTS") mensaje = "No hay transporte público directo entre estos puntos";
                    mostrarError(mensaje);
                }
            });
        }

        function mostrarError(texto) {
            document.getElementById("resultados").innerHTML = `<div class="error">${texto}</div>`;
        }
    </script>

    <!-- ✅ APIs completas: places, geocoding, directions -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places,geocoding,directions&callback=initMap&language=es&region=PE">
    </script>
</body>
</html>
