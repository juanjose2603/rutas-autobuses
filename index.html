<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial‑scale=1.0">
<title>Rutas Transporte Lima — Google Maps</title>
<style>
  * {box-sizing:border-box; font-family:Arial,sans-serif;}
  body{margin:0; padding:10px; background:#f5f5f5;}
  .caja{max‑width:1000px; margin:auto; background:#fff; padding:15px; border‑radius:8px; box‑shadow:0 2px 8px #0002;}
  .fila{display:flex; gap:8px; flex‑wrap:wrap; margin‑bottom:10px;}
  input,button{padding:10px; border‑radius:6px; border:1px solid #ccc; font‑size:15px;}
  button{background:#1a73e8; color:#fff; border:0; cursor:pointer;}
  button:hover{background:#0d59c2;}
  #mapa{height:500px; width:100%; border‑radius:6px; margin:10px 0;}
  #resultados{margin‑top:10px; padding‑left:0;}
  .ruta{padding:8px; background:#f1f8ff; border‑left:4px solid #1a73e8; margin‑bottom:6px; border‑radius:4px;}
</style>
<!-- ↓↓↓ COLOCA AQUÍ TU CLAVE DE GOOGLE MAPS ↓↓↓ -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places"></script>
</head>
<body>
<div class="caja">
  <h2>🚌🚇 Rutas transporte público — Lima</h2>
  <div class="fila">
    <button onclick="usarMiUbicacion()">📍 Mi ubicación</button>
    <input type="text" id="origen" placeholder="Origen o dirección inicio">
    <input type="text" id="destino" placeholder="Destino o dirección final">
    <button onclick="calcularRuta()">🔍 Calcular rutas</button>
  </div>
  <div id="mapa"></div>
  <h4>📋 Opciones de ruta:</h4>
  <ul id="resultados"></ul>
</div>

<script>
let mapa, servicioRutas, panel;

function iniciarMapa() {
  mapa = new google.maps.Map(document.getElementById("mapa"), {
    center: {lat:-12.0464,lng:-77.0428}, zoom:12
  });
  servicioRutas = new google.maps.DirectionsService();
  panel = new google.maps.DirectionsRenderer({suppressMarkers:false, draggable:false});
  panel.setMap(mapa);
}

function usarMiUbicacion() {
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const latlng = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      document.getElementById("origen").value = `${latlng.lat()}, ${latlng.lng()}`;
      mapa.setCenter(latlng);
      mapa.setZoom(15);
    }, err=>alert("❌ No se pudo obtener ubicación"));
  } else alert("❌ Tu navegador no soporta ubicación");
}

function calcularRuta() {
  const origen = document.getElementById("origen").value.trim();
  const destino = document.getElementById("destino").value.trim();
  if(!origen || !destino) return alert("⚠️ Completa origen y destino");

  const solicitud = {
    origin: origen,
    destination: destino,
    travelMode: google.maps.TravelMode.TRANSIT, // ✅ SOLO TRANSPORTE PÚBLICO
    transitOptions: {
      modes: ["BUS","RAIL","SUBWAY","TRAM"] // ✅ incluye Metropolitano, corredores, alimentadores
    },
    provideRouteAlternatives: true // ✅ MUESTRA TODAS LAS OPCIONES POSIBLES
  };

  servicioRutas.route(solicitud, function(respuesta, estado){
    const lista = document.getElementById("resultados");
    lista.innerHTML = "";
    if(estado === "OK"){
      panel.setDirections(respuesta);
      respuesta.routes.forEach((ruta,i)=>{
        const li = document.createElement("li");
        li.className = "ruta";
        li.innerHTML = `<strong>Ruta ${i+1}</strong> — Duración: ${ruta.legs[0].duration.text} | Distancia: ${ruta.legs[0].distance.text}<br>🚌 ${ruta.legs[0].steps.map(p=>p.instructions).join(" → ")}`;
        lista.appendChild(li);
      });
    } else alert("❌ No se encontraron rutas: "+estado);
  });
}

google.maps.event.addDomListener(window, "load", iniciarMapa);
</script>
</body>
</html>
