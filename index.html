<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas + Compartir Ubicación</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; }
        .panel { padding: 12px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .campo { margin: 8px 0; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
        button { padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 6px 6px 6px 0; font-size: 14px; }
        .btn-azul { background: #1a73e8; color: white; }
        .btn-verde { background: #34a853; color: white; }
        .btn-rojo { background: #ea4335; color: white; }
        button:hover { opacity: 0.9; }
        #map { flex: 1; width: 100%; }
        #rutas { margin-top: 12px; max-height: 220px; overflow-y: auto; background: white; padding: 10px; border-radius: 4px; border: 1px solid #eee; font-size: 14px; }
        #compartir-info { margin-top: 10px; padding: 8px; background: #e8f0fe; border-radius: 4px; display: none; font-size: 13px; }
        .ruta-titulo { cursor: pointer; padding: 6px; border-radius: 4px; margin: 4px 0; font-weight: bold; }
        .ruta-titulo:hover { background: #f1f3f4; }
        .activa { background: #e8f0fe; }
        .linea { margin-left: 12px; padding: 2px 0; }
        .ruta1 { color: #1a73e8; }
        .ruta2 { color: #34a853; }
        .ruta3 { color: #fbbc05; }
        .ruta4 { color: #ea4335; }
    </style>
</head>
<body>
    <div class="panel">
        <input type="text" id="origen" class="campo" placeholder="Origen — se detecta automáticamente">
        <input type="text" id="destino" class="campo" placeholder="Dirección de llegada">
        <br>
        <button class="btn-azul" onclick="usarMiUbicacion()">📍 Mi ubicación</button>
        <button class="btn-azul" onclick="calcularRuta()">🚌 Ver rutas</button>
        <button class="btn-verde" onclick="iniciarCompartir()">🔁 Compartir en tiempo real</button>
        <button class="btn-rojo" onclick="detenerCompartir()" id="btnDetener" style="display:none;">⏹️ Dejar de compartir</button>

        <div id="compartir-info">
            <p>✅ Compartiendo ubicación. Actualización cada 5 segundos.</p>
            <p>Enlace: <a id="enlaceUbicacion" href="#" target="_blank">Cargando...</a></p>
            <button onclick="copiarEnlace()">📋 Copiar enlace</button>
        </div>

        <div id="rutas"></div>
    </div>
    <div id="map"></div>

    <script>
        let mapa, servicioDirecciones, renderizadores = [], marcadorUbicacion, watchId = null;
        const COLORES = ["#1a73e8", "#34a853", "#fbbc05", "#ea4335"];
        const GROSOR_NORMAL = 4, GROSOR_ACTIVO = 7;
        const OPACIDAD_NORMAL = 0.6, OPACIDAD_ACTIVO = 1.0;

        function iniciarMapa() {
            mapa = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 19.4326, lng: -99.1332 }, zoom: 12
            });
            servicioDirecciones = new google.maps.DirectionsService();
            new google.maps.places.Autocomplete(document.getElementById("origen"));
            new google.maps.places.Autocomplete(document.getElementById("destino"));
            usarMiUbicacion();
        }

        function usarMiUbicacion() {
            if (!navigator.geolocation) return alert("Geolocalización no soportada");
            navigator.geolocation.getCurrentPosition(pos => {
                const ubicacion = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                mapa.setCenter(ubicacion);
                if (!marcadorUbicacion) {
                    marcadorUbicacion = new google.maps.Marker({
                        position: ubicacion, map: mapa, title: "Mi ubicación actual",
                        icon: { url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png" }
                    });
                } else marcadorUbicacion.setPosition(ubicacion);
                new google.maps.Geocoder().geocode({ location: ubicacion }, res => {
                    if (res[0]) document.getElementById("origen").value = res[0].formatted_address;
                });
            }, () => alert("No se pudo obtener ubicación"));
        }

        // 🆕 Compartir en tiempo real
        function iniciarCompartir() {
            if (!navigator.geolocation) return alert("No soportado");
            if (watchId) detenerCompartir();

            document.getElementById("compartir-info").style.display = "block";
            document.getElementById("btnDetener").style.display = "inline-block";

            watchId = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6);
                const lng = pos.coords.longitude.toFixed(6);
                const ubicacion = { lat: parseFloat(lat), lng: parseFloat(lng) };

                if (marcadorUbicacion) marcadorUbicacion.setPosition(ubicacion);
                mapa.setCenter(ubicacion);

                // Enlace directo a Google Maps
                const enlace = `https://www.google.com/maps?q=${lat},${lng}`;
                document.getElementById("enlaceUbicacion").href = enlace;
                document.getElementById("enlaceUbicacion").textContent = enlace;
            }, err => alert("Error: " + err.message), { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
        }

        function detenerCompartir() {
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            document.getElementById("compartir-info").style.display = "none";
            document.getElementById("btnDetener").style.display = "none";
        }

        function copiarEnlace() {
            const enlace = document.getElementById("enlaceUbicacion").href;
            navigator.clipboard.writeText(enlace)
                .then(() => alert("Enlace copiado ✅"))
                .catch(() => alert("No se pudo copiar"));
        }

        function calcularRuta() {
            const origen = document.getElementById("origen").value.trim();
            const destino = document.getElementById("destino").value.trim();
            if (!origen || !destino) return alert("Completa origen y destino");

            renderizadores.forEach(r => r.setMap(null));
            renderizadores = [];
            document.getElementById("rutas").innerHTML = "";

            const solicitud = {
                origin: origen, destination: destino, travelMode: "TRANSIT",
                transitOptions: { modes: ["BUS", "SUBWAY", "TRAIN"], routingPreference: "FEWER_TRANSFERS" },
                provideRouteAlternatives: true
            };

            servicioDirecciones.route(solicitud, (respuesta, estado) => {
                if (estado !== "OK") return document.getElementById("rutas").innerHTML = "Sin rutas disponibles";
                respuesta.routes.forEach((ruta, i) => {
                    const render = new google.maps.DirectionsRenderer({
                        map: mapa, directions: respuesta, routeIndex: i, suppressMarkers: false,
                        polylineOptions: { strokeColor: COLORES[i] || "#666", strokeWeight: GROSOR_NORMAL, strokeOpacity: OPACIDAD_NORMAL }
                    });
                    renderizadores.push(render);
                });
                mostrarDetallesRutas(respuesta);
            });
        }

        function mostrarDetallesRutas(respuesta) {
            const contenedor = document.getElementById("rutas");
            let html = "<h4>Rutas disponibles:</h4>";
            respuesta.routes.forEach((ruta, i) => {
                const tramo = ruta.legs[0];
                const clase = `ruta${i+1}`;
                html += `<div class="ruta-titulo ${clase}" onclick="resaltarRuta(${i})" id="titulo-${i}">
                    🚏 Ruta ${i+1} | ${tramo.duration.text} | ${tramo.distance.text}</div><ul>`;
                tramo.steps.forEach(paso => {
                    if (paso.travel_mode === "TRANSIT") {
                        const linea = paso.transit.line;
                        const tipo = linea.vehicle.type;
                        let nombreTipo = tipo === "BUS" ? linea.short_name?.startsWith("R") ? "Corredor" : linea.short_name?.startsWith("A") ? "Alimentador" : "Autobús" :
                                         tipo === "SUBWAY" ? "Metro" : "Metropolitano/Tren";
                        html += `<li class="linea ${clase}">✅ ${nombreTipo}: ${linea.short_name || linea.name}</li>
                                 <li>De: ${paso.transit.departure_stop.name} → ${paso.transit.arrival_stop.name}</li>`;
                    } else html += `<li class="linea">🚶 A pie: ${paso.distance.text}</li>`;
                });
                html += "</ul><hr>";
            });
            contenedor.innerHTML = html;
            if (respuesta.routes.length > 0) resaltarRuta(0);
        }

        function resaltarRuta(indiceActivo) {
            renderizadores.forEach((render, i) => {
                const activa = i === indiceActivo;
                render.setOptions({ polylineOptions: { strokeColor: COLORES[i], strokeWeight: activa ? GROSOR_ACTIVO : GROSOR_NORMAL, strokeOpacity: activa ? OPACIDAD_ACTIVO : OPACIDAD_NORMAL } });
                document.getElementById(`titulo-${i}`).classList.toggle("activa", activa);
            });
        }

        window.onload = iniciarMapa;
    </script>
</body>
</html>
