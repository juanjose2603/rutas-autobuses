<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Transporte Lima</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        .container { max-width:900px; margin:15px auto; padding:0 15px; }
        #origen, #destino { width:100%; padding:12px; font-size:16px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; }
        #btnUbicacion { background:#1a73e8; color:white; border:none; padding:10px 15px; border-radius:4px; cursor:pointer; margin-bottom:15px; font-size:15px; }
        #btnUbicacion:hover { background:#1557b0; }
        #map { height:450px; width:100%; margin-bottom:15px; border-radius:6px; }
        #resultado { padding:15px; background:#f8f9fa; border-radius:6px; min-height:80px; }
        h2 { margin:15px 0; color:#202124; text-align:center; }
        #estado { padding:10px; margin-bottom:15px; border-radius:4px; font-weight:500; text-align:center; }
        
        .ruta-item { padding:12px; margin:8px 0; background:white; border-left:4px solid; border-radius:4px; }
        .tipo-bus { border-color:#28a745; }
        .tipo-corredor { border-color:#ffc107; }
        .tipo-metropolitano { border-color:#dc3545; }
        .tiempo { font-weight:bold; color:#28a745; }
        .error { background: #ffebee; color: #b71c1c; padding: 10px; border-radius: 4px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚌 Rutas Actualizadas Lima</h2>
        <div id="estado">🔄 Preparando sistema...</div>

        <label>📍 Punto de inicio:</label>
        <input id="origen" placeholder="Tu ubicación o escribe otra dirección..." />
        <button id="btnUbicacion" onclick="usarUbicacionActual()">Usar mi ubicación actual</button>

        <label>🎯 Destino:</label>
        <input id="destino" placeholder="Escribe dirección o lugar de destino..." />

        <div id="map"></div>
        <div id="resultado">Las rutas aparecerán aquí.</div>
    </div>

    <script>
        let map, directionsService, directionsRenderer, autocompleteOrigen, autocompleteDestino;
        let ubicacionActual = null;

        // Inicializar mapa
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -12.0464, lng: -77.0428 },
                zoom: 12
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ 
                map: map,
                suppressMarkers: false,
                preserveViewport: false
            });
            new google.maps.TransitLayer().setMap(map);

            // Autocompletar direcciones solo en Perú
            autocompleteOrigen = new google.maps.places.Autocomplete(document.getElementById("origen"), {
                componentRestrictions: { country: "pe" },
                fields: ["formatted_address", "geometry", "name"]
            });
            autocompleteDestino = new google.maps.places.Autocomplete(document.getElementById("destino"), {
                componentRestrictions: { country: "pe" },
                fields: ["formatted_address", "geometry", "name"]
            });

            // ✅ CORRECCIÓN: Aseguramos que se seleccione de la lista
            autocompleteOrigen.addListener("place_changed", () => {
                const lugar = autocompleteOrigen.getPlace();
                if (!lugar.geometry) {
                    document.getElementById("estado").textContent = "⚠️ Escribe y SELECCIONA una dirección de la lista";
                    document.getElementById("estado").style.background = "#fff3e0";
                    return;
                }
                calcularRuta();
            });

            autocompleteDestino.addListener("place_changed", () => {
                const lugar = autocompleteDestino.getPlace();
                if (!lugar.geometry) {
                    document.getElementById("estado").textContent = "⚠️ Escribe y SELECCIONA una dirección de la lista";
                    document.getElementById("estado").style.background = "#fff3e0";
                    return;
                }
                calcularRuta();
            });

            // Intentar obtener ubicación al iniciar
            usarUbicacionActual();
        }

        // 📍 Función mejorada para detectar ubicación
        function usarUbicacionActual() {
            const estado = document.getElementById("estado");
            estado.textContent = "🔄 Buscando tu ubicación...";
            estado.style.background = "#e3f2fd";
            estado.style.color = "#0d47a1";

            if (!navigator.geolocation) {
                estado.textContent = "❌ Tu navegador no admite ubicación";
                estado.style.background = "#ffebee";
                estado.style.color = "#b71c1c";
                return;
            }

            const opciones = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                (posicion) => {
                    ubicacionActual = {
                        lat: posicion.coords.latitude,
                        lng: posicion.coords.longitude
                    };

                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: ubicacionActual }, (resultados, status) => {
                        if (status === "OK" && resultados[0]) {
                            document.getElementById("origen").value = resultados[0].formatted_address;
                            map.setCenter(ubicacionActual);
                            map.setZoom(15);
                            estado.textContent = "✅ Ubicación detectada correctamente";
                            estado.style.background = "#e8f5e9";
                            estado.style.color = "#1b5e20";
                        } else {
                            estado.textContent = "⚠️ Ubicación detectada, pero no se pudo convertir a dirección";
                            estado.style.background = "#fff3e0";
                            estado.style.color = "#e65100";
                            document.getElementById("origen").value = `${ubicacionActual.lat.toFixed(5)}, ${ubicacionActual.lng.toFixed(5)}`;
                        }
                    });
                },
                (error) => {
                    let mensaje = "❌ No se pudo obtener la ubicación: ";
                    switch(error.code) {
                        case 1: mensaje += "Permiso denegado. Actívalo en la configuración del navegador."; break;
                        case 2: mensaje += "Posición no disponible. Revisa tu conexión o GPS."; break;
                        case 3: mensaje += "Tiempo de espera agotado. Intenta de nuevo."; break;
                        default: mensaje += "Error desconocido.";
                    }
                    estado.textContent = mensaje;
                    estado.style.background = "#ffebee";
                    estado.style.color = "#b71c1c";
                },
                opciones
            );
        }

        // ✅ FUNCIÓN CORREGIDA CON ERRORES DETALLADOS
        function calcularRuta() {
            const estado = document.getElementById("estado");
            const resultado = document.getElementById("resultado");
            
            // Obtener valores validados
            let origen = autocompleteOrigen.getPlace();
            let destino = autocompleteDestino.getPlace();

            // Validación estricta
            if (!destino || !destino.geometry) {
                resultado.innerHTML = `<p class="error">❌ Escribe y SELECCIONA el DESTINO de la lista que aparece abajo</p>`;
                return;
            }

            if (!origen || !origen.geometry) {
                if (ubicacionActual) {
                    origen = ubicacionActual; // Usar coordenadas si no hay lugar seleccionado
                } else {
                    resultado.innerHTML = `<p class="error">❌ Escribe y SELECCIONA el ORIGEN de la lista o usa el botón de ubicación</p>`;
                    return;
                }
            } else {
                origen = origen.formatted_address;
            }

            estado.textContent = "🔄 Calculando ruta...";
            estado.style.background = "#fff3e0";
            estado.style.color = "#e65100";
            resultado.innerHTML = "<p>Procesando solicitud...</p>";

            // ✅ SOLICITUD COMPLETA Y CORRECTA
            const solicitud = {
                origin: origen,
                destination: destino.formatted_address,
                travelMode: google.maps.TravelMode.TRANSIT,
                provideRouteAlternatives: true,
                transitOptions: {
                    modes: [
                        google.maps.TransitMode.BUS,
                        google.maps.TransitMode.RAIL,
                        google.maps.TransitMode.SUBWAY
                    ],
                    routingPreference: google.maps.TransitRoutingPreference.FEWER_TRANSFERS
                },
                unitSystem: google.maps.UnitSystem.METRIC,
                region: 'pe' // ✅ Importante: forzamos región Perú
            };

            // ✅ MANEJO DE ERRORES COMPLETO
            directionsService.route(solicitud, (respuesta, estadoRuta) => {
                console.log("Respuesta:", respuesta, "Estado:", estadoRuta); // Para ver en consola

                if (estadoRuta === "OK") {
                    if (respuesta.routes.length === 0) {
                        resultado.innerHTML = `<p class="error">❌ Google Maps no tiene datos de transporte público entre estos puntos</p>`;
                        estado.textContent = "⚠️ Sin rutas disponibles";
                        estado.style.background = "#fff3e0";
                        estado.style.color = "#e65100";
                        return;
                    }

                    directionsRenderer.setDirections(respuesta);
                    mostrarResultados(respuesta);
                    estado.textContent = "✅ Ruta encontrada";
                    estado.style.background = "#e8f5e9";
                    estado.style.color = "#1b5e20";
                } else {
                    let mensajeError = "";
                    switch(estadoRuta) {
                        case "NOT_FOUND": 
                            mensajeError = "❌ No se encontró una de las direcciones. Escríbela más completa y selecciónala de la lista."; 
                            break;
                        case "ZERO_RESULTS": 
                            mensajeError = "❌ No hay rutas de transporte público entre estos dos puntos (solo hay caminos o autos)."; 
                            break;
                        case "OVER_QUERY_LIMIT": 
                            mensajeError = "❌ Límite de consultas excedido o falta activar facturación en Google Cloud."; 
                            break;
                        case "REQUEST_DENIED": 
                            mensajeError = "❌ CLAVE API INVÁLIDA o SERVICIOS NO ACTIVADOS. Revisa: 1) Que la clave esté bien escrita 2) Que hayas activado Directions API, Places API, Geocoding API."; 
                            break;
                        case "INVALID_REQUEST": 
                            mensajeError = "❌ Datos inválidos. Asegúrate de seleccionar las direcciones de la lista desplegable."; 
                            break;
                        default: 
                            mensajeError = `❌ Error desconocido: ${estadoRuta}`;
                    }
                    resultado.innerHTML = `<p class="error">${mensajeError}</p>`;
                    estado.textContent = "❌ Error al calcular";
                    estado.style.background = "#ffebee";
                    estado.style.color = "#b71c1c";
                }
            });
        }

        // Mostrar resultados detallados
        function mostrarResultados(respuesta) {
            let html = "<h3>📋 Opciones de ruta</h3>";

            respuesta.routes.forEach((ruta, indice) => {
                const tiempoTotal = ruta.legs[0].duration.text;
                const distancia = ruta.legs[0].distance.text;

                html += `
                    <div class="ruta-item">
                        <h4>Opción ${indice+1} ⏱️ <span class="tiempo">${tiempoTotal}</span> | 📏 ${distancia}</h4>
                `;

                ruta.legs[0].steps.forEach(paso => {
                    if (paso.travel_mode === "TRANSIT") {
                        const linea = paso.transit.line;
                        const nombreLinea = linea.short_name || linea.name;
                        const tipoVehiculo = linea.vehicle.name;
                        let etiqueta = "";
                        let clase = "";

                        if (nombreLinea.match(/^CR/i) || tipoVehiculo.includes("Corredor")) {
                            etiqueta = "🚏 Corredor: ";
                            clase = "tipo-corredor";
                        } else if (nombreLinea.match(/^[A-D]/i) || tipoVehiculo.includes("Metropolitano")) {
                            etiqueta = "🚇 Metropolitano: ";
                            clase = "tipo-metropolitano";
                        } else {
                            etiqueta = "🚌 Bus: ";
                            clase = "tipo-bus";
                        }

                        html += `
                            <p class="${clase}">
                                ${etiqueta}<strong>${nombreLinea}</strong><br>
                                <small>De: ${paso.transit.departure_stop.name}</small><br>
                                <small>Hasta: ${paso.transit.arrival_stop.name}</small><br>
                                <small>⏱️ ${paso.duration.text}</small>
                            </p>
                        `;
                    } else if (paso.travel_mode === "WALKING") {
                        html += `<p>🚶 Caminar: ${paso.duration.text} (${paso.distance.text})</p>`;
                    }
                });

                html += `</div>`;
            });

            html += `<p style="font-size:12px; color:#666; margin-top:10px;">ℹ️ Datos proporcionados por Google Maps</p>`;
            document.getElementById("resultado").innerHTML = html;
        }
    </script>

    <!-- ✅ LIBRERÍAS COMPLETAS: FALTABA DIRECTIONS ANTES -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places,geocoding,directions&callback=initMap" async defer></script>
</body>
</html>
