<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Transporte - Lista debajo del mapa</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; }

        /* Panel superior */
        .panel-superior {
            padding: 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .campo {
            margin: 8px 0;
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 6px 6px 6px 0;
            font-size: 14px;
        }
        .btn-azul { background: #1a73e8; color: white; }
        .btn-verde { background: #34a853; color: white; }
        .btn-rojo { background: #ea4335; color: white; }
        .btn-gris { background: #70757a; color: white; }
        button:hover { opacity: 0.9; }

        /* Mapa */
        #map {
            width: 100%;
            height: 55vh;
            border-bottom: 1px solid #ddd;
        }

        /* Sección de rutas debajo del mapa */
        .seccion-rutas {
            padding: 12px;
            background: #ffffff;
            overflow-y: auto;
            flex: 1;
        }
        .titulo-seccion {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .ruta-item {
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .ruta-item:hover {
            background-color: #f8f9fa;
            border-color: #ccc;
        }
        .ruta-item.activa {
            background-color: #e8f0fe;
            border-color: #1a73e8;
        }
        .ruta-titulo {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .detalles-ruta {
            font-size: 14px;
            color: #555;
            margin-left: 10px;
        }
        .linea {
            margin: 6px 0;
        }
        .a-pie {
            color: #70757a;
            font-style: italic;
        }
        .horario {
            font-size: 13px;
            color: #666;
            margin-left: 15px;
        }

        /* Colores por ruta */
        .ruta1 { color: #1a73e8; }
        .ruta2 { color: #34a853; }
        .ruta3 { color: #fbbc05; }
        .ruta4 { color: #ea4335; }

        /* Compartir ubicación */
        #compartir-info {
            margin-top: 10px;
            padding: 8px;
            background: #e8f0fe;
            border-radius: 4px;
            display: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- Panel superior -->
    <div class="panel-superior">
        <input type="text" id="origen" class="campo" placeholder="Origen — se detecta automáticamente">
        <input type="text" id="destino" class="campo" placeholder="Dirección de llegada">

        <button class="btn-azul" onclick="usarMiUbicacion()">📍 Mi ubicación</button>
        <button class="btn-azul" onclick="calcularRuta()">🚌 Buscar rutas</button>
        <button class="btn-verde" onclick="iniciarSeguimiento()">🔁 Seguimiento recorrido</button>
        <button class="btn-gris" onclick="limpiarRecorrido()">🧹 Limpiar recorrido</button>
        <button class="btn-rojo" onclick="detenerSeguimiento()" id="btnDetener" style="display:none;">⏹️ Detener seguimiento</button>

        <div id="compartir-info">
            <p>✅ Seguimiento activo. Actualización cada 3 segundos.</p>
            <p>Enlace: <a id="enlaceUbicacion" href="#" target="_blank">Cargando...</a></p>
            <button onclick="copiarEnlace()">📋 Copiar enlace</button>
        </div>
    </div>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- LISTA DE RUTAS AQUÍ DEBAJO DEL MAPA -->
    <div class="seccion-rutas">
        <div class="titulo-seccion">Rutas disponibles:</div>
        <div id="lista-rutas">Escribe el origen y destino, luego pulsa "Buscar rutas"</div>
    </div>

    <script>
        let mapa, servicioDirecciones, marcadorUbicacion, watchId = null;
        let lineaRecorrido = null, puntosRecorrido = [];
        let respuestaCompleta = null;
        let elementosRuta = [];

        const COLORES = ["#1a73e8", "#34a853", "#fbbc05", "#ea4335"];
        const COLOR_PIE = "#909090";
        const ESTILO_PIE = {
            strokeOpacity: 0.7,
            strokeWeight: 3,
            icons: [{
                icon: { path: google.maps.SymbolPath.FORWARD_OPEN_ARROW, scale: 2 },
                offset: '100%',
                repeat: '50px'
            }]
        };

        function iniciarMapa() {
            mapa = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 19.4326, lng: -99.1332 },
                zoom: 12
            });
            servicioDirecciones = new google.maps.DirectionsService();
            new google.maps.places.Autocomplete(document.getElementById("origen"));
            new google.maps.places.Autocomplete(document.getElementById("destino"));
            usarMiUbicacion();
        }

        function usarMiUbicacion() {
            if (!navigator.geolocation) return alert("Geolocalización no soportada en tu navegador");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const ubicacion = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    mapa.setCenter(ubicacion);
                    if (!marcadorUbicacion) {
                        marcadorUbicacion = new google.maps.Marker({
                            position: ubicacion,
                            map: mapa,
                            title: "Mi ubicación",
                            icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
                        });
                    } else {
                        marcadorUbicacion.setPosition(ubicacion);
                    }
                    new google.maps.Geocoder().geocode({ location: ubicacion }, (res) => {
                        if (res[0]) document.getElementById("origen").value = res[0].formatted_address;
                    });
                },
                () => alert("No se pudo obtener la ubicación. Revisa los permisos.")
            );
        }

        function calcularRuta() {
            const origen = document.getElementById("origen").value.trim();
            const destino = document.getElementById("destino").value.trim();
            if (!origen || !destino) return alert("Completa ambos campos: origen y destino");

            limpiarRutaAnterior();
            respuestaCompleta = null;
            document.getElementById("lista-rutas").innerHTML = "🔄 Buscando rutas...";

            const solicitud = {
                origin: origen,
                destination: destino,
                travelMode: "TRANSIT",
                transitOptions: { modes: ["BUS", "SUBWAY", "TRAIN"], routingPreference: "FEWER_TRANSFERS" },
                provideRouteAlternatives: true,
                language: "es",
                region: "MX",
                unitSystem: google.maps.UnitSystem.METRIC
            };

            servicioDirecciones.route(solicitud, (respuesta, estado) => {
                if (estado !== "OK") {
                    document.getElementById("lista-rutas").innerHTML = "❌ No se encontraron rutas para este trayecto";
                    return;
                }

                respuestaCompleta = respuesta;
                mostrarListaRutas();
            });
        }

        function limpiarRutaAnterior() {
            elementosRuta.forEach(el => { if (el && el.setMap) el.setMap(null); });
            elementosRuta = [];
        }

        // ✅ Mostrar rutas en lista debajo del mapa
        function mostrarListaRutas() {
            const contenedor = document.getElementById("lista-rutas");
            contenedor.innerHTML = "";

            respuestaCompleta.routes.forEach((ruta, indice) => {
                const tramo = ruta.legs[0];
                const duracion = tramo.duration?.text || "Sin tiempo";
                const distancia = tramo.distance?.text || "Sin distancia";
                const claseColor = `ruta${indice + 1}`;

                const divRuta = document.createElement("div");
                divRuta.className = "ruta-item";
                divRuta.id = `ruta-${indice}`;
                divRuta.onclick = () => seleccionarRuta(indice);

                let contenido = `<div class="ruta-titulo ${claseColor}">🚏 Ruta ${indice + 1} | ${duracion} | ${distancia}</div>`;
                contenido += `<div class="detalles-ruta">`;

                tramo.steps.forEach(paso => {
                    if (!paso) return;
                    if (paso.travel_mode === "TRANSIT" && paso.transit) {
                        const linea = paso.transit.line;
                        if (!linea) return;
                        const numeroRuta = linea.short_name || linea.name || "Sin número";
                        const tipo = linea.vehicle?.type || "";
                        let tipoTexto = "";

                        if (tipo === "BUS") {
                            tipoTexto = numeroRuta.startsWith("R") ? "Corredor" :
                                        numeroRuta.startsWith("A") ? "Alimentador" : "Autobús";
                        } else if (tipo === "SUBWAY") tipoTexto = "Metro";
                        else if (tipo === "TRAIN" || tipo === "RAIL") tipoTexto = "Metropolitano / Tren";

                        contenido += `<div class="linea">✅ ${tipoTexto}: <strong>${numeroRuta}</strong></div>`;
                        contenido += `<div class="horario">⏱️ Salida: ${paso.transit.departure_time?.text || "?"} → Llegada: ${paso.transit.arrival_time?.text || "?"}</div>`;
                    } else if (paso.travel_mode === "WALKING") {
                        contenido += `<div class="linea a-pie">🚶 A pie: ${paso.distance?.text || "?"} | ${paso.duration?.text || "?"}</div>`;
                    }
                });

                contenido += `</div>`;
                divRuta.innerHTML = contenido;
                contenedor.appendChild(divRuta);
            });

            if (respuestaCompleta.routes.length > 0) seleccionarRuta(0);
        }

        function seleccionarRuta(indice) {
            if (isNaN(indice) || !respuestaCompleta || !respuestaCompleta.routes[indice]) return;

            limpiarRutaAnterior();
            document.querySelectorAll(".ruta-item").forEach(el => el.classList.remove("activa"));
            document.getElementById(`ruta-${indice}`).classList.add("activa");

            const ruta = respuestaCompleta.routes[indice];
            const tramo = ruta.legs[0];
            const colorRuta = COLORES[indice] || "#666666";

            tramo.steps.forEach(paso => {
                if (!paso || !paso.path) return;
                const trazo = new google.maps.Polyline({
                    path: paso.path,
                    geodesic: true,
                    strokeColor: paso.travel_mode === "TRANSIT" ? colorRuta : COLOR_PIE,
                    strokeWeight: paso.travel_mode === "TRANSIT" ? 6 : 3,
                    strokeOpacity: paso.travel_mode === "TRANSIT" ? 0.9 : 0.7,
                    icons: paso.travel_mode === "WALKING" ? ESTILO_PIE.icons : []
                });
                trazo.setMap(mapa);
                elementosRuta.push(trazo);
            });

            mapa.fitBounds(tramo.bounds);
        }

        // Funciones de seguimiento
        function iniciarSeguimiento() {
            if (!navigator.geolocation) return alert("Tu navegador no admite geolocalización");
            if (watchId) detenerSeguimiento();

            document.getElementById("compartir-info").style.display = "block";
            document.getElementById("btnDetener").style.display = "inline-block";
            limpiarRecorrido();

            lineaRecorrido = new google.maps.Polyline({
                path: puntosRecorrido,
                strokeColor: "#2196F3",
                strokeOpacity: 0.9,
                strokeWeight: 5
            });
            lineaRecorrido.setMap(mapa);

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude.toFixed(6);
                    const lng = pos.coords.longitude.toFixed(6);
                    const ubicacion = { lat: parseFloat(lat), lng: parseFloat(lng) };

                    puntosRecorrido.push(ubicacion);
                    lineaRecorrido.setPath(puntosRecorrido);
                    if (marcadorUbicacion) marcadorUbicacion.setPosition(ubicacion);
                    mapa.setCenter(ubicacion);

                    document.getElementById("enlaceUbicacion").href = `https://www.google.com/maps?q=${lat},${lng}`;
                    document.getElementById("enlaceUbicacion").textContent = `${lat}, ${lng}`;
                },
                (err) => alert("Error al obtener ubicación: " + err.message),
                { enableHighAccuracy: true, maximumAge: 2000, timeout: 5000 }
            );
        }

        function detenerSeguimiento() {
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            document.getElementById("compartir-info").style.display = "none";
            document.getElementById("btnDetener").style.display = "none";
        }

        function limpiarRecorrido() {
            puntosRecorrido = [];
            if (lineaRecorrido) lineaRecorrido.setPath([]);
        }

        function copiarEnlace() {
            const enlace = document.getElementById("enlaceUbicacion").href;
            navigator.clipboard.writeText(enlace)
                .then(() => alert("Enlace copiado ✅"))
                .catch(() => alert("No se pudo copiar el enlace"));
        }

        window.onload = iniciarMapa;
    </script>
</body>
</html>
