<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas de Autobús - Tu Ubicación</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        .container { max-width:900px; margin:15px auto; padding:0 15px; }
        #buscador { width:100%; padding:12px; font-size:16px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; }
        #map { height:450px; width:100%; margin-bottom:15px; border-radius:6px; }
        #resultado { padding:15px; background:#f8f9fa; border-radius:6px; min-height:80px; }
        h2 { margin:15px 0; color:#202124; }
        #estado { color:#1a73e8; margin-bottom:10px; font-size:14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>¿Qué autobús me lleva?</h2>
        <div id="estado">🔄 Obteniendo tu ubicación...</div>
        <input id="buscador" placeholder="Escribe dirección o destino en Lima..." />
        <div id="map"></div>
        <div id="resultado">Las líneas de autobús aparecerán aquí.</div>
    </div>

    <script>
        let map, directionsService, directionsRenderer, autocomplete;
        let ubicacionActual = null; // Aquí guardaremos tu ubicación

        function initMap() {
            // Mapa centrado temporalmente en Lima hasta obtener tu ubicación
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -12.0464, lng: -77.0428 },
                zoom: 12
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
            new google.maps.TransitLayer().setMap(map);

            // Configuración del buscador
            autocomplete = new google.maps.places.Autocomplete(document.getElementById("buscador"), {
                componentRestrictions: { country: "pe" },
                fields: ["formatted_address", "geometry"]
            });
            autocomplete.addListener("place_changed", buscarRuta);

            // 📍 LLAMADA PARA OBTENER TU UBICACIÓN
            obtenerUbicacionActual();
        }

        // Función principal para detectar ubicación
        function obtenerUbicacionActual() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (posicion) => {
                        // Guardamos coordenadas de tu ubicación
                        ubicacionActual = {
                            lat: posicion.coords.latitude,
                            lng: posicion.coords.longitude
                        };
                        // Centramos el mapa en tu ubicación
                        map.setCenter(ubicacionActual);
                        map.setZoom(14);
                        document.getElementById("estado").textContent = "✅ Ubicación obtenida correctamente";
                        
                        // Marcador en tu posición
                        new google.maps.Marker({
                            position: ubicacionActual,
                            map: map,
                            title: "Estás aquí",
                            icon: {
                                url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
                            }
                        });
                    },
                    (error) => {
                        // Si hay error o no das permiso
                        let mensajeError = "❌ No se pudo acceder a tu ubicación: ";
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                mensajeError += "Permiso denegado por el usuario.";
                                break;
                            case error.POSITION_UNAVAILABLE:
                                mensajeError += "Información de ubicación no disponible.";
                                break;
                            case error.TIMEOUT:
                                mensajeError += "Tiempo de espera agotado.";
                                break;
                            default:
                                mensajeError += "Error desconocido.";
                        }
                        document.getElementById("estado").textContent = mensajeError;
                        // Usamos Lima como origen alternativo
                        ubicacionActual = "Lima, Perú";
                    }
                );
            } else {
                document.getElementById("estado").textContent = "❌ Tu navegador no soporta geolocalización.";
                ubicacionActual = "Lima, Perú";
            }
        }

        function buscarRuta() {
            const destino = autocomplete.getPlace();
            if (!destino.geometry || !ubicacionActual) return;

            const solicitud = {
                origin: ubicacionActual, // 📌 USAMOS TU UBICACIÓN COMO ORIGEN
                destination: destino.formatted_address,
                travelMode: "TRANSIT",
                provideRouteAlternatives: true,
                transitOptions: { modes: ["BUS"] }
            };

            directionsService.route(solicitud, (respuesta, estado) => {
                if (estado === "OK") {
                    directionsRenderer.setDirections(respuesta);
                    mostrarResultados(respuesta);
                } else {
                    document.getElementById("resultado").innerHTML = "❌ No se encontraron rutas disponibles.";
                }
            });
        }

        function mostrarResultados(respuesta) {
            let html = "<h3>🚌 Líneas disponibles:</h3>";
            respuesta.routes.forEach(ruta => {
                ruta.legs[0].steps.forEach(paso => {
                    if (paso.travel_mode === "TRANSIT") {
                        const linea = paso.transitDetails.line;
                        html += `
                            <p>🔹 <strong>${linea.short_name || linea.name}</strong> — ${linea.vehicle.name}</p>
                            <small>Desde: ${paso.transitDetails.departure_stop.name}</small><br>
                            <small>Hasta: ${paso.transitDetails.arrival_stop.name}</small><br><br>
                        `;
                    }
                });
            });
            document.getElementById("resultado").innerHTML = html || "ℹ️ El trayecto es solo caminata o no hay autobuses directos.";
        }
    </script>

    <!-- 🚨 RECUERDA PONER TU CLAVE API AQUÍ -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places&callback=initMap" async></script>
</body>
</html>
