<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas de Transporte Lima</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; }
        .panel { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        button:hover { background: #1557b0; }
        #rutas { margin-top: 12px; max-height: 220px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; background: white; }
        .ruta-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .ruta-item:hover { background: #f1f8ff; }
        .ruta-titulo { font-weight: bold; color: #202124; margin-bottom: 4px; }
        .ruta-detalle { font-size: 14px; color: #5f6368; }
        #map { flex: 1; width: 100%; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="input-group">
            <input id="origen" placeholder="📍 Punto de partida" type="text">
            <button id="miUbicacion">Usar mi ubicación</button>
        </div>
        <div class="input-group">
            <input id="destino" placeholder="🏁 Dirección de destino" type="text">
            <button id="buscar">Buscar rutas</button>
        </div>
        <div id="rutas"></div>
    </div>
    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer, autocompleteOrigen, autocompleteDestino;

        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");
            const { DirectionsService, DirectionsRenderer } = await google.maps.importLibrary("routes");
            const { Autocomplete } = await google.maps.importLibrary("places");

            // Mapa centrado en Lima
            map = new Map(document.getElementById("map"), {
                center: { lat: -12.0464, lng: -77.0428 },
                zoom: 12,
                mapId: "TRANSPORTE_LIMA"
            });

            directionsService = new DirectionsService();
            directionsRenderer = new DirectionsRenderer({ map: map, suppressPolylines: false });

            // Autocompletar direcciones
            autocompleteOrigen = new Autocomplete(document.getElementById("origen"), { types: ["geocode"], componentRestrictions: { country: "PE" } });
            autocompleteDestino = new Autocomplete(document.getElementById("destino"), { types: ["geocode"], componentRestrictions: { country: "PE" } });

            // Botón: usar ubicación actual
            document.getElementById("miUbicacion").addEventListener("click", () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        new google.maps.Geocoder().geocode({ location: latlng }, res => {
                            if (res[0]) document.getElementById("origen").value = res[0].formatted_address;
                        });
                    }, () => alert("No se pudo acceder a tu ubicación"));
                }
            });

            // Buscar rutas
            document.getElementById("buscar").addEventListener("click", buscarRutas);
            document.getElementById("destino").addEventListener("keydown", e => e.key === "Enter" && buscarRutas());
        }

        function buscarRutas() {
            const origen = document.getElementById("origen").value.trim();
            const destino = document.getElementById("destino").value.trim();
            if (!origen || !destino) return alert("Completa origen y destino");

            directionsService.route({
                origin: origen,
                destination: destino,
                travelMode: google.maps.TravelMode.TRANSIT,
                provideRouteAlternatives: true,
                transitOptions: { departureTime: new Date() }
            })
            .then(respuesta => {
                directionsRenderer.setDirections(respuesta);
                mostrarRutasEnLista(respuesta.routes);
            })
            .catch(err => {
                console.error(err);
                document.getElementById("rutas").innerHTML = "<p style='padding:12px'>No se encontraron rutas de transporte público</p>";
            });
        }

        function mostrarRutasEnLista(rutas) {
            const contenedor = document.getElementById("rutas");
            contenedor.innerHTML = "";

            rutas.forEach((ruta, idx) => {
                const duracion = ruta.legs[0].duration.text;
                const distancia = ruta.legs[0].distance.text;
                let medios = [];

                ruta.legs[0].steps.forEach(paso => {
                    if (paso.travelMode === "TRANSIT") {
                        const linea = paso.transit.line.shortName || paso.transit.line.name;
                        const tipo = paso.transit.line.vehicle.name;
                        medios.push(`${tipo}: ${linea}`);
                    }
                });

                const div = document.createElement("div");
                div.className = "ruta-item";
                div.innerHTML = `
                    <div class="ruta-titulo">Opción ${idx+1} • ${duracion} • ${distancia}</div>
                    <div class="ruta-detalle">${medios.join(" → ") || "A pie + transporte"}</div>
                `;
                div.addEventListener("click", () => directionsRenderer.setRouteIndex(idx));
                contenedor.appendChild(div);
            });
        }
    </script>

    <!-- Carga API Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places&callback=initMap" async defer></script>
</body>
</html>
