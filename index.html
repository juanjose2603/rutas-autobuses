<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas de Transporte Público</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; }
        .panel { padding: 12px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .campo { margin: 8px 0; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
        button { padding: 10px 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 8px; }
        button:hover { background: #1557b0; }
        #map { flex: 1; width: 100%; }
        #rutas { margin-top: 12px; max-height: 220px; overflow-y: auto; background: white; padding: 10px; border-radius: 4px; border: 1px solid #eee; font-size: 14px; }
        .linea { font-weight: bold; color: #0b8043; }
    </style>
</head>
<body>
    <div class="panel">
        <input type="text" id="origen" class="campo" placeholder="Origen — se detecta automáticamente">
        <input type="text" id="destino" class="campo" placeholder="Dirección de llegada">
        <button onclick="usarMiUbicacion()">Usar mi ubicación</button>
        <button onclick="calcularRuta()">Ver rutas</button>
        <div id="rutas"></div>
    </div>
    <div id="map"></div>

    <script>
        let mapa, servicioDirecciones, visualizadorRuta;

        // Inicializar mapa
        function iniciarMapa() {
            mapa = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 19.4326, lng: -99.1332 }, // CDMX por defecto
                zoom: 12
            });

            servicioDirecciones = new google.maps.DirectionsService();
            visualizadorRuta = new google.maps.DirectionsRenderer({ map: mapa });

            // Autocompletar direcciones
            new google.maps.places.Autocomplete(document.getElementById("origen"));
            new google.maps.places.Autocomplete(document.getElementById("destino"));

            // Detectar ubicación automáticamente al cargar
            usarMiUbicacion();
        }

        // Obtener ubicación actual
        function usarMiUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const ubicacion = {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude
                        };
                        mapa.setCenter(ubicacion);
                        // Convertir coordenadas a dirección legible
                        new google.maps.Geocoder().geocode({ location: ubicacion }, (res) => {
                            if (res[0]) document.getElementById("origen").value = res[0].formatted_address;
                        });
                    },
                    () => alert("No se pudo acceder a tu ubicación. Revisa permisos.")
                );
            } else {
                alert("Tu navegador no soporta geolocalización");
            }
        }

        // Calcular rutas de transporte público
        function calcularRuta() {
            const origen = document.getElementById("origen").value;
            const destino = document.getElementById("destino").value;

            if (!origen || !destino) {
                alert("Completa ambas direcciones");
                return;
            }

            const solicitud = {
                origin: origen,
                destination: destino,
                travelMode: "TRANSIT", // Modo transporte público
                transitOptions: {
                    modes: ["BUS", "SUBWAY", "TRAIN"], // Autobús, Metro, Tren/Metropolitano
                    routingPreference: "FEWER_TRANSFERS"
                },
                provideRouteAlternatives: true
            };

            servicioDirecciones.route(solicitud, (respuesta, estado) => {
                if (estado === "OK") {
                    visualizadorRuta.setDirections(respuesta);
                    mostrarDetallesRutas(respuesta);
                } else {
                    document.getElementById("rutas").innerHTML = "No se encontraron rutas de transporte público.";
                }
            });
        }

        // Mostrar líneas, corredores, alimentadores
        function mostrarDetallesRutas(respuesta) {
            const contenedor = document.getElementById("rutas");
            let html = "<h4>Rutas disponibles:</h4>";

            respuesta.routes.forEach((ruta, i) => {
                const tramo = ruta.legs[0];
                html += `<p><strong>Ruta ${i+1}</strong> — Duración: ${tramo.duration.text} | Distancia: ${tramo.distance.text}</p><ul>`;

                tramo.steps.forEach(paso => {
                    if (paso.travel_mode === "TRANSIT") {
                        const linea = paso.transit.line;
                        const tipo = linea.vehicle.type;
                        let nombreTipo = "";

                        // Clasificar tipos según nomenclatura CDMX
                        if (tipo === "BUS") nombreTipo = linea.short_name?.startsWith("R") ? "Corredor" : linea.short_name?.startsWith("A") ? "Alimentador" : "Autobús";
                        if (tipo === "SUBWAY") nombreTipo = "Metro";
                        if (tipo === "TRAIN" || tipo === "RAIL") nombreTipo = "Metropolitano / Tren";

                        html += `<li class="linea">${nombreTipo}: ${linea.short_name || linea.name}</li>
                                 <li>De: ${paso.transit.departure_stop.name} → Hasta: ${paso.transit.arrival_stop.name}</li>`;
                    } else {
                        html += `<li>A pie: ${paso.distance.text}</li>`;
                    }
                });
                html += "</ul><hr>";
            });

            contenedor.innerHTML = html;
        }

        window.onload = iniciarMapa;
    </script>
</body>
</html>
