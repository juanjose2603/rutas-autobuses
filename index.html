<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas de Transporte Lima</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body {display:flex; flex-direction:column; height:100vh;}
        .panel {padding:15px; background:#f8f9fa; border-bottom:1px solid #ddd;}
        input {width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:4px;}
        button {width:100%; padding:10px; margin:5px 0; background:#1a73e8; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:15px;}
        .btn-secundario {background:#34a853; margin-bottom:10px;}
        #map {flex:1;}
        #resultados {margin-top:10px; max-height:220px; overflow-y:auto; font-size:14px;}
        .ruta {padding:8px; margin:5px 0; background:#fff; border-radius:4px; border-left:4px solid #1a73e8;}
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-secundario" onclick="usarUbicacionActual()">📍 Usar mi ubicación actual</button>
        <input id="origen" placeholder="Dirección de partida">
        <input id="destino" placeholder="Dirección de destino" required>
        <button onclick="calcularRuta()">🔍 Buscar líneas y rutas</button>
        <div id="resultados"></div>
    </div>
    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer;
        const LIMA = {lat: -12.0464, lng: -77.0428};

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: LIMA,
                zoom: 12,
                language: "es",
                region: "PE"
            });
            new google.maps.TransitLayer().setMap(map);
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                panel: document.getElementById("resultados"),
                suppressMarkers: false
            });

            // Autocompletar direcciones en Perú
            new google.maps.places.Autocomplete(document.getElementById("origen"), {
                componentRestrictions: {country: "PE"}
            });
            new google.maps.places.Autocomplete(document.getElementById("destino"), {
                componentRestrictions: {country: "PE"}
            });
        }

        // 📍 Función para obtener ubicación actual
        function usarUbicacionActual() {
            if (!navigator.geolocation) {
                alert("Tu navegador no admite ubicación");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (posicion) => {
                    const lat = posicion.coords.latitude;
                    const lng = posicion.coords.longitude;
                    const ubicacion = {lat, lng};
                    // Convertir coordenadas a dirección legible
                    new google.maps.Geocoder().geocode({location: ubicacion}, (resultados, estado) => {
                        if (estado === "OK" && resultados[0]) {
                            document.getElementById("origen").value = resultados[0].formatted_address;
                            map.setCenter(ubicacion);
                        } else {
                            document.getElementById("origen").value = `${lat}, ${lng}`;
                        }
                    });
                },
                (error) => {
                    let mensaje = "No se pudo obtener tu ubicación";
                    if (error.code === 1) mensaje = "Permiso denegado para acceder a la ubicación";
                    alert(mensaje);
                },
                {enableHighAccuracy: true, timeout: 8000}
            );
        }

        // 🚌 Calcular ruta en transporte público
        function calcularRuta() {
            const origen = document.getElementById("origen").value.trim();
            const destino = document.getElementById("destino").value.trim();
            if (!origen || !destino) {
                alert("Completa tanto el origen como el destino");
                return;
            }

            directionsService.route({
                origin: origen,
                destination: destino,
                travelMode: google.maps.TravelMode.TRANSIT,
                transitOptions: {
                    modes: ["BUS", "RAIL"],
                    routingPreference: "FEWER_TRANSFERS"
                },
                provideRouteAlternatives: true,
                unitSystem: google.maps.UnitSystem.METRIC,
                region: "PE"
            }, (respuesta, estado) => {
                if (estado === "OK") {
                    directionsRenderer.setDirections(respuesta);
                } else {
                    alert("No se encontró ruta: " + estado);
                }
            });
        }
    </script>

    <!-- Reemplaza TU_CLAVE_API por la que generaste en Google Cloud -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAr6Z1hFZ_HCI14Wb49_vV0q4r0oiG9BAA&libraries=places,geocoding&callback=initMap&language=es&region=PE">
    </script>
</body>
</html>
